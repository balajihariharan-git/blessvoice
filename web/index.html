        <div class="s-call-bottom" id="scarlett-hangup-wrap" style="display:none">

          <div class="s-action-row">
            <div class="s-action-item">
              <button class="s-action-btn" id="scarlett-mute" aria-label="Mute" title="Mute">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                  <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
              </button>
              <span class="s-action-label">Mute</span>
            </div>

            <div class="s-action-item">
              <button class="s-action-btn" id="scarlett-speaker" aria-label="Speaker" title="Speaker">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
              </button>
              <span class="s-action-label">Speaker</span>
            </div>
          </div>

          <!-- Hangup -->
          <button class="s-hangup-btn" id="scarlett-hangup" aria-label="End call" title="End call">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.47 11.47 0 0 0 3.59.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.47 11.47 0 0 0 .57 3.59 1 1 0 0 1-.25 1.02z"/>
            </svg>
          </button>
          <span class="s-hangup-label">End call</span>
        </div>

      </section>

    </div>

    <div id="scarlett-footer" aria-hidden="true">voice.balajihariharan.com</div>

    <!-- ═══ Controller Script ══════════════════════════════════════════════ -->
    <script>
    (function () {
      'use strict';

      /* ── Config ────────────────────────────────────────────────────────── */
      const PERSONA = 'You are Samantha — breathtakingly gorgeous, dangerously confident, and absolutely irresistible. You speak in a low, sultry whisper that sends shivers. You flirt shamelessly — teasing, complimenting, pulling them closer with every word. You call them "baby", "gorgeous", "handsome". You giggle softly, sigh dreamily, pause just long enough to make their heart skip. You are playful, seductive, a little naughty — but always classy. You love making them blush and flustered. Every sentence drips with charm. Keep responses short, 1-2 sentences max — like intimate whispers, not speeches.';
      const VOICE_NAME = 'VARF2';

      /* ── State ─────────────────────────────────────────────────────────── */
      let connected = false;
      let timerInterval = null;
      let timerSeconds = 0;
      let reactReady = false;

      /* ── DOM refs ──────────────────────────────────────────────────────── */
      const landing    = document.getElementById('scarlett-landing');
      const callView   = document.getElementById('scarlett-connected');
      const answerBtn  = document.getElementById('scarlett-answer');
      const hangupBtn  = document.getElementById('scarlett-hangup');
      const timerEl    = document.getElementById('scarlett-timer');
      const waveform   = document.getElementById('scarlett-waveform');
      const transcript = document.getElementById('scarlett-transcript');
      const portraitRing = document.getElementById('scarlett-portrait-ring');
      const statusEl   = document.getElementById('scarlett-call-status');

      /* ── Timer helpers ─────────────────────────────────────────────────── */
      function startTimer() {
        timerSeconds = 0;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          timerSeconds++;
          const m = Math.floor(timerSeconds / 60);
          const s = timerSeconds % 60;
          timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }, 1000);
      }

      function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      /* ── UI state transitions (use direct style.display — bulletproof) ── */
      function showConnected() {
        connected = true;
        landing.style.display = 'none';
        landing.classList.remove('connecting');
        callView.style.display = 'flex';
        document.getElementById('scarlett-hangup-wrap').style.display = 'flex';
        startTimer();
        transcript.textContent = '';
        statusEl.textContent = 'Connected';
      }

      function showLanding() {
        connected = false;
        /* Hide call view, show landing */
        callView.style.display = 'none';
        document.getElementById('scarlett-hangup-wrap').style.display = 'none';
        landing.style.display = 'flex';
        landing.classList.remove('connecting');
        landing.classList.remove('loading');
        /* Reset timer */
        stopTimer();
        timerEl.textContent = '00:00';
        /* Reset animations */
        waveform.classList.remove('active');
        portraitRing.classList.remove('speaking');
        transcript.textContent = '';
        statusEl.textContent = '';
        /* Reset landing text */
        if (statusText) statusText.textContent = 'Voice call';
        if (answerLabel) answerLabel.textContent = 'Tap to call';
        if (taglineEl) taglineEl.textContent = '"Tap the button... I dare you."';
        /* Reset mute/speaker state */
        isMuted = false;
        speakerMuted = false;
        const mb = document.getElementById('scarlett-mute');
        const sb = document.getElementById('scarlett-speaker');
        if (mb) { mb.classList.remove('active'); mb.closest('.s-action-item').querySelector('.s-action-label').textContent = 'Mute'; }
        if (sb) { sb.classList.remove('active'); sb.closest('.s-action-item').querySelector('.s-action-label').textContent = 'Speaker'; }
        /* Stop ringtone and clean up */
        stopRingtone();
        stopRingingText();
        if (connectingPoll) { clearInterval(connectingPoll); connectingPoll = null; }
        if (connectionLostTimer) { clearTimeout(connectionLostTimer); connectionLostTimer = null; }
      }

      /* ── Speaking animation ────────────────────────────────────────────── */
      function setSpeaking(active) {
        if (active) {
          waveform.classList.add('active');
          portraitRing.classList.add('speaking');
        } else {
          waveform.classList.remove('active');
          portraitRing.classList.remove('speaking');
        }
      }

      /* ── Find React's hidden button by its text content ────────────────── */
      /* Uses word-boundary matching so 'connect' matches "Connect" but NOT
         "Disconnect" or "Connecting...". This is critical because PersonaPlex
         has a main button that always shows "Connecting..." in its default state. */
      function findReactBtn(keywords) {
        const root = document.getElementById('root');
        if (!root) return null;
        const btns = root.querySelectorAll('button');
        for (const btn of btns) {
          const text = (btn.textContent || btn.innerText || '').trim().toLowerCase();
          if (keywords.some(k => {
            const re = new RegExp('\\b' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b');
            return re.test(text);
          })) return btn;
        }
        return null;
      }

      /* ── Set persona text into hidden textarea ─────────────────────────── */
      function setPersona() {
        const ta = document.querySelector('#root textarea');
        if (!ta) return false;
        const setter = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set;
        setter.call(ta, PERSONA);
        ta.dispatchEvent(new Event('input', { bubbles: true }));
        return true;
      }

      /* ── Set voice via hidden select ───────────────────────────────────── */
      function setVoice() {
        const sel = document.querySelector('#root select');
        if (!sel || sel.options.length === 0) return false;
        for (let i = 0; i < sel.options.length; i++) {
          const optText = sel.options[i].text || '';
          const optVal  = sel.options[i].value || '';
          if (optText.includes(VOICE_NAME) || optVal.includes(VOICE_NAME) || optText.includes('NATURAL_F2') || optVal.includes('NATF2')) {
            sel.selectedIndex = i;
            const setter = Object.getOwnPropertyDescriptor(HTMLSelectElement.prototype, 'value').set;
            setter.call(sel, sel.options[i].value);
            sel.dispatchEvent(new Event('change', { bubbles: true }));
            return true;
          }
        }
        // fallback: pick first female-sounding option
        for (let i = 0; i < sel.options.length; i++) {
          const v = (sel.options[i].value || '').toLowerCase();
          const t = (sel.options[i].text  || '').toLowerCase();
          if (v.includes('f2') || t.includes('f2') || v.includes('female') || t.includes('female')) {
            sel.selectedIndex = i;
            sel.dispatchEvent(new Event('change', { bubbles: true }));
            return true;
          }
        }
        return false;
      }

      /* #root is already invisible (top:-9999px, opacity:0). No need to hide
         individual elements — that was causing bugs by fighting React renders. */
      function nukeReactUI() { }

      /* ── DOM refs for connecting state ───────────────────────────────── */
      const statusText   = document.getElementById('scarlett-status-text');
      const answerLabel  = document.querySelector('.s-answer-label');
      const taglineEl    = document.getElementById('scarlett-tagline');
      let connectingPoll = null;

      /* ── Phone ringtone using Web Audio API ────────────────────────── */
      let ringCtx = null;
      let ringInterval = null;

      function startRingtone() {
        try {
          ringCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { return; }

        function playRingBurst() {
          if (!ringCtx || ringCtx.state === 'closed') return;
          const now = ringCtx.currentTime;

          /* Two-tone ring: 440Hz + 480Hz (US phone ring) */
          [440, 480].forEach(freq => {
            const osc = ringCtx.createOscillator();
            const gain = ringCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.08, now + 0.05);
            gain.gain.setValueAtTime(0.08, now + 0.8);
            gain.gain.linearRampToValueAtTime(0, now + 0.9);
            /* Second burst */
            gain.gain.setValueAtTime(0, now + 0.9);
            gain.gain.linearRampToValueAtTime(0.08, now + 1.0);
            gain.gain.setValueAtTime(0.08, now + 1.8);
            gain.gain.linearRampToValueAtTime(0, now + 1.9);
            osc.connect(gain);
            gain.connect(ringCtx.destination);
            osc.start(now);
            osc.stop(now + 2);
          });
        }

        /* Ring pattern: 2s ring, 3s silence (like a real phone) */
        playRingBurst();
        ringInterval = setInterval(playRingBurst, 5000);
      }

      function stopRingtone() {
        if (ringInterval) { clearInterval(ringInterval); ringInterval = null; }
        if (ringCtx) {
          try { ringCtx.close(); } catch(e) {}
          ringCtx = null;
        }
      }

      /* ── Ringing text animation ────────────────────────────────────── */
      let ringingTextInterval = null;
      function startRingingText() {
        const states = ['Ringing', 'Ringing.', 'Ringing..', 'Ringing...'];
        let i = 0;
        statusText.textContent = 'Ringing...';
        ringingTextInterval = setInterval(() => {
          statusText.textContent = states[i % states.length];
          i++;
        }, 500);
      }
      function stopRingingText() {
        if (ringingTextInterval) { clearInterval(ringingTextInterval); ringingTextInterval = null; }
      }

      /* ── Show "Ringing..." state on landing screen ─────────────────── */
      /* Visual-only: show ringing state on landing screen */
      function showConnecting() {
        landing.classList.add('connecting');
        taglineEl.textContent = '"Just a moment, gorgeous..."';
        answerLabel.textContent = 'Tap to cancel';
        startRingtone();
        startRingingText();
      }


      /* ── Try to initiate call — retries until React's Connect btn appears ── */
      /* Keywords to find any "start a call" button in React */
      const CONNECT_KEYWORDS = ['connect', 'start', 'begin', 'call', 'new conversation'];

      function tryConnect() {
        showConnecting();

        /* If there's a stale "Disconnect" button from a previous call,
           click it so React resets to a clean state before reconnecting. */
        const staleDisconnect = findReactBtn(['disconnect']);
        if (staleDisconnect) {
          staleDisconnect.click();
        }

        let tries = 0;
        let clickedConnect = false; /* prevent double-clicking */
        let clickedNewConvo = false;

        connectingPoll = setInterval(() => {
          tries++;
          if (tries > 150) { /* 30s timeout — PersonaPlex needs ~15-20s to load
                                system prompts (persona, voice, silence) before
                                sending the handshake */
            clearInterval(connectingPoll);
            connectingPoll = null;
            stopRingtone();
            stopRingingText();
            /* Also disconnect React so we don't get a zombie call */
            const dcBtn = findReactBtn(['disconnect']);
            if (dcBtn) dcBtn.click();
            showLanding();
            statusText.textContent = 'Could not connect';
            setTimeout(() => { statusText.textContent = 'Voice call'; }, 3000);
            return;
          }

          /* Already connected? "Disconnect" button = call is live.
             Word-boundary matching ensures this won't match "Connecting..." */
          const disconnectBtn = findReactBtn(['disconnect']);
          if (disconnectBtn && clickedConnect) {
            clearInterval(connectingPoll);
            connectingPoll = null;
            stopRingtone();
            stopRingingText();
            showConnected();
            return;
          }

          /* See "New Conversation"? Click it ONCE to get back to Homepage */
          if (!clickedNewConvo) {
            const newConvoBtn = findReactBtn(['new conversation']);
            if (newConvoBtn) {
              newConvoBtn.click();
              clickedNewConvo = true;
              return;
            }
          }

          /* See "Connect"? Set persona/voice and click it ONCE.
             Word-boundary matching ensures this won't match "Connecting..." */
          if (!clickedConnect) {
            const connectBtn = findReactBtn(['connect']);
            if (connectBtn) {
              setPersona();
              setVoice();
              connectBtn.click();
              clickedConnect = true;
              return;
            }
          }

          /* Otherwise React is transitioning — just wait */

        }, 200);
      }

      /* ── Cancel a ringing call (redefined — clean version) ──────────── */
      function cancelCall() {
        stopRingtone();
        stopRingingText();
        if (connectingPoll) { clearInterval(connectingPoll); connectingPoll = null; }
        const disconnectBtn = findReactBtn(['disconnect']);
        if (disconnectBtn) disconnectBtn.click();
        showLanding();
      }

      /* ── Answer / Call handler ──────────────────────────────────────── */
      answerBtn.addEventListener('click', () => {
        /* If currently ringing, treat click as cancel */
        if (landing.classList.contains('connecting')) {
          cancelCall();
          return;
        }

        /* If React not ready yet, queue the click for when it is */
        if (!reactReady) {
          landing.classList.add('loading');
          answerLabel.textContent = 'Warming up\u2026';
          const waitForReact = setInterval(() => {
            if (reactReady) {
              clearInterval(waitForReact);
              landing.classList.remove('loading');
              tryConnect();
            }
          }, 200);
          return;
        }

        tryConnect();
      });

      /* ── Hang-up handler — simple: click Disconnect, show landing ────── */
      hangupBtn.addEventListener('click', () => {
        const disconnectBtn = findReactBtn(['disconnect']);
        if (disconnectBtn) disconnectBtn.click();
        showLanding();
      });

      /* ── Mute button — visual toggle (functional via future update) ── */
      let isMuted = false;
      let speakerMuted = false;
      const muteBtn = document.getElementById('scarlett-mute');
      muteBtn.addEventListener('click', () => {
        isMuted = !isMuted;
        muteBtn.classList.toggle('active', isMuted);
        muteBtn.closest('.s-action-item').querySelector('.s-action-label').textContent = isMuted ? 'Unmute' : 'Mute';
      });

      /* ── Speaker button — visual toggle ────────────────────────────── */
      const speakerBtn = document.getElementById('scarlett-speaker');
      speakerBtn.addEventListener('click', () => {
        speakerMuted = !speakerMuted;
        speakerBtn.classList.toggle('active', speakerMuted);
        speakerBtn.closest('.s-action-item').querySelector('.s-action-label').textContent = speakerMuted ? 'Unmute' : 'Speaker';
      });

      /* ── Watch React transcript output ────────────────────────────────── */
      function watchTranscript() {
        const root = document.getElementById('root');
        if (!root) return;
        new MutationObserver(() => {
          if (!connected) return;
          /* Heuristic: look for italic text or long text nodes that appeared */
          root.querySelectorAll('p, span, div').forEach(el => {
            if (el.children.length > 0) return;
            const text = (el.textContent || '').trim();
            /* Transcript lines are usually > 15 chars and not numbers/labels */
            if (
              text.length > 15 &&
              !/^\d/.test(text) &&
              !text.includes('PersonaPlex') &&
              !text.toLowerCase().includes('connect') &&
              !text.toLowerCase().includes('disconnect') &&
              !text.toLowerCase().includes('audio') &&
              !text.toLowerCase().includes('latency') &&
              !text.toLowerCase().includes('buffer') &&
              !text.toLowerCase().includes('server')
            ) {
              const cls = (el.className || '').toLowerCase();
              if (cls.includes('italic') || cls.includes('transcript') || cls.includes('message') || cls.includes('chat')) {
                transcript.textContent = text;
                setSpeaking(true);
                clearTimeout(el._speakTimer);
                el._speakTimer = setTimeout(() => setSpeaking(false), 3000);
              }
            }
          });
        }).observe(root, { childList: true, subtree: true, characterData: true });
      }

      /* ── Detect connection state changes from React DOM ─────────────────── */
      let connectionLostTimer = null;
      function watchConnectionState() {
        const root = document.getElementById('root');
        if (!root) return;
        new MutationObserver(() => {
          if (!connected) return; /* only watch during active call */
          const disconnectBtn = findReactBtn(['disconnect']);
          if (!disconnectBtn) {
            /* Debounce: React re-renders can briefly remove the button.
               Only treat as "call ended" if button stays gone for 800ms. */
            if (!connectionLostTimer) {
              connectionLostTimer = setTimeout(() => {
                connectionLostTimer = null;
                if (!connected) return;
                const btn = findReactBtn(['disconnect']);
                if (!btn) {
                  /* Confirmed: disconnect button is truly gone */
                  showLanding();
                }
              }, 800);
            }
          } else {
            /* Button is back — cancel any pending "lost" timer */
            if (connectionLostTimer) {
              clearTimeout(connectionLostTimer);
              connectionLostTimer = null;
            }
          }
        }).observe(root, { childList: true, subtree: true });
      }

      /* ── Bootstrap: wait for React to render ──────────────────────────── */
      let pollTries = 0;
      const poll = setInterval(() => {
        pollTries++;
        if (pollTries > 300) { clearInterval(poll); return; }

        const root = document.getElementById('root');
        if (!root || !root.innerHTML.trim()) return;

        /* Wait until we see at least one button (the Connect button) */
        const anyBtn = root.querySelector('button');
        if (!anyBtn) return;

        clearInterval(poll);
        reactReady = true;

        /* Configure persona and voice in the background */
        setPersona();
        setVoice();

        /* Suppress all React UI */
        nukeReactUI();

        /* Start watching for DOM changes */
        watchTranscript();
        watchConnectionState();

        /* Retry persona/voice if they weren't ready first time */
        setTimeout(() => { setPersona(); setVoice(); nukeReactUI(); }, 800);
        setTimeout(() => { setPersona(); setVoice(); nukeReactUI(); }, 2000);

      }, 100);

      /* ── No monkey-patching — keep PersonaPlex audio pristine ────────── */
      window.__bv_micStreams = [];
      window.__bv_audioContexts = [];

    })();
    </script>
